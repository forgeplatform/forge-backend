name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check . || true
      - name: Validate pyproject.toml
        run: python -c "import tomllib; tomllib.load(open('pyproject.toml','rb'))"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: pip install "Django==4.2.29" pytest pytest-mock PyYAML requests jinja2
      - name: Run standalone tests (isolated per file, no DB)
        run: |
          set -e
          # The standalone modules monkeypatch sys.modules (stub Django) and are
          # designed to run one-per-process; collecting them together in a single
          # pytest run cross-contaminates sys.modules. So run each in its own
          # process with the inifile addopts (pytest-django flags) cleared.
          # Excluded: test_integration (needs a live backend),
          # test_audit_trail (pulls full app deps incl. psycopg),
          # test_dynamic_survey_standalone (order-dependent Django stub).
          for f in $(ls tests_standalone/test_*.py | grep -vE 'test_integration|test_audit_trail|test_dynamic_survey_standalone'); do
            echo "::group::$f"
            python -m pytest "$f" -o addopts="" -q
            echo "::endgroup::"
          done
