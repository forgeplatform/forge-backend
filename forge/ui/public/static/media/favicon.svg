<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="500" rx="60" fill="#0D0F12"/>
  
  <!-- Subtle radial glow behind anvil -->
  <radialGradient id="glow" cx="250" cy="280" r="180" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#E8531E" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#E8531E" stop-opacity="0"/>
  </radialGradient>
  <circle cx="250" cy="280" r="180" fill="url(#glow)"/>

  <!-- Floor reflection line -->
  <line x1="100" y1="410" x2="400" y2="410" stroke="#1A1D23" stroke-width="2"/>

  <g transform="translate(95, 80) scale(4.2)">
    <!-- Anvil base (wider trapezoid) -->
    <path d="M10 62 L17 50 L57 50 L64 62 Z" fill="#E8531E"/>
    
    <!-- Anvil body -->
    <path d="M15 50 L15 35 C15 29 20 24 28 24 L50 24 C55 24 58 27 58 32 L58 50 Z" fill="#FF6B35"/>
    
    <!-- Anvil horn (left side) -->
    <path d="M2 35 L15 35 L15 43 L6 43 Z" fill="#FF6B35"/>
    
    <!-- Anvil top face highlight -->
    <path d="M15 24 L58 24 L58 29 L15 29 Z" fill="#F5A623" opacity="0.5"/>
    
    <!-- Anvil edge highlight -->
    <path d="M15 24 L58 24" stroke="#FFD93D" stroke-width="0.8" opacity="0.4"/>
    
    <!-- Hammer -->
    <g transform="rotate(-38, 44, 14)">
      <!-- Handle -->
      <rect x="41" y="4" width="5.5" height="22" rx="1.8" fill="#F5F6F8"/>
      <!-- Head -->
      <rect x="35" y="1" width="18" height="9" rx="2.2" fill="#C4C9D4"/>
      <!-- Head top highlight -->
      <rect x="35" y="1" width="18" height="3.5" rx="1.2" fill="#F5F6F8" opacity="0.45"/>
      <!-- Head bottom shadow -->
      <rect x="35" y="7" width="18" height="3" rx="1" fill="#8B919E" opacity="0.3"/>
    </g>
    
    <!-- Impact sparks cluster -->
    <circle cx="36" cy="22" r="2.2" fill="#FFD93D">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="28" cy="18" r="1.4" fill="#FFD93D" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="44" cy="19" r="1.6" fill="#F5A623" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.4;0.85" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="31" cy="15" r="1.0" fill="#FFD93D" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="41" cy="15" r="0.8" fill="#FFD93D" opacity="0.5"/>
    <circle cx="25" cy="21" r="0.9" fill="#F5A623" opacity="0.55"/>
    
    <!-- Small flying spark trails -->
    <line x1="28" y1="18" x2="22" y2="12" stroke="#FFD93D" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="44" y1="19" x2="50" y2="13" stroke="#F5A623" stroke-width="0.5" opacity="0.35" stroke-linecap="round"/>
    <line x1="31" y1="15" x2="27" y2="9" stroke="#FFD93D" stroke-width="0.4" opacity="0.3" stroke-linecap="round"/>
  </g>
</svg>
